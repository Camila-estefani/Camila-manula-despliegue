<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar-closed]="!sidebarOpen">
    <div class="sidebar-header">
      <h1 class="sidebar-title">VISONS</h1>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span class="hamburger">☰</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul class="menu-list">
        <li *ngFor="let item of menuItems" 
            [class.active]="activeRoute === item.route"
            class="menu-item">
          <a [routerLink]="item.route" 
             (click)="setActiveRoute(item.route)"
             class="menu-link">
            <span class="menu-icon">{{ item.shortLabel }}</span>
            <span class="menu-label" *ngIf="sidebarOpen">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer" *ngIf="sidebarOpen">
      <p class="version">v1.0.0</p>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <h2 class="page-title">Panel de Administración</h2>
      </div>
      <div class="top-bar-right">
        <div class="user-info">
          <span class="username">Administrador</span>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
